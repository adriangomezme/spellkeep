name: commander-sync

on:
  schedule:
    # Runs every 5 days at 06:00 UTC. EDHREC's week/month feeds shift
    # slowly enough that this cadence keeps the carousel meaningfully
    # fresh without hammering their backend. The 06:00 UTC slot is
    # off-peak and doesn't compete with the catalog-sync (13:00 UTC)
    # or the price-alert sweep windows (13:00 / 18:00 / 23:00 UTC).
    #
    # `*/5` resets at month boundaries (Mar 26 → Apr 1 is a 6-day
    # gap), but the consumer (Top Commanders carousel) is tolerant
    # of small cadence drift since the data is editorial-discovery,
    # not load-bearing.
    - cron: '0 6 */5 * *'
  workflow_dispatch:
    inputs:
      top_n:
        description: 'Override top-N per window (default 100)'
        required: false
        default: '100'

concurrency:
  group: commander-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: workers/commander-sync

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: workers/commander-sync/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run commander sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COMMANDER_TOP_N: ${{ github.event.inputs.top_n || '100' }}
        run: npm start
