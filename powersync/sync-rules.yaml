# ============================================================
# SpellKeep - PowerSync Sync Rules
# ============================================================
# These rules define what data syncs to each user's device.
#
# Strategy:
# - Sets: Global bucket → all users get all sets (small, ~1k rows)
# - Cards: Only cards the user owns in collections or decks
# - User data: Everything owned by the user (bidirectional)
# ============================================================

bucket_definitions:

  # ----------------------------------------------------------
  # Global: Sets catalog (read-only, syncs to all users)
  # Small table (~1k rows), everyone needs it for display
  # ----------------------------------------------------------
  global_sets:
    data:
      - SELECT id, scryfall_id, code, name, set_type, released_at,
               card_count, icon_svg_uri, updated_at
        FROM sets

  # ----------------------------------------------------------
  # User's collection cards (with their card data)
  # Only syncs cards that exist in the user's collections
  # ----------------------------------------------------------
  user_collections:
    parameters: SELECT request.user_id() as user_id
    data:
      # Collections (main collection, binders, lists)
      - SELECT * FROM collections
        WHERE user_id = bucket.user_id

      # Collection card entries
      - SELECT cc.* FROM collection_cards cc
        JOIN collections c ON cc.collection_id = c.id
        WHERE c.user_id = bucket.user_id

      # Card data for cards in the user's collections
      - SELECT cards.* FROM cards
        JOIN collection_cards cc ON cards.id = cc.card_id
        JOIN collections c ON cc.collection_id = c.id
        WHERE c.user_id = bucket.user_id

  # ----------------------------------------------------------
  # User's decks (with their card data)
  # Only syncs cards that exist in the user's decks
  # ----------------------------------------------------------
  user_decks:
    parameters: SELECT request.user_id() as user_id
    data:
      # Deck folders
      - SELECT * FROM deck_folders
        WHERE user_id = bucket.user_id

      # Decks
      - SELECT * FROM decks
        WHERE user_id = bucket.user_id

      # Deck card entries
      - SELECT dc.* FROM deck_cards dc
        JOIN decks d ON dc.deck_id = d.id
        WHERE d.user_id = bucket.user_id

      # Card data for cards in the user's decks
      - SELECT cards.* FROM cards
        JOIN deck_cards dc ON cards.id = dc.card_id
        JOIN decks d ON dc.deck_id = d.id
        WHERE d.user_id = bucket.user_id

  # ----------------------------------------------------------
  # User profile
  # ----------------------------------------------------------
  user_profile:
    parameters: SELECT request.user_id() as user_id
    data:
      - SELECT * FROM profiles
        WHERE id = bucket.user_id

  # ----------------------------------------------------------
  # User's scan history
  # ----------------------------------------------------------
  user_scans:
    parameters: SELECT request.user_id() as user_id
    data:
      - SELECT * FROM scan_history
        WHERE user_id = bucket.user_id
